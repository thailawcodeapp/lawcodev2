name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 36
        run: |
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_STORE_BASE64 }}
        run: |
          python3 -c "
          import base64, os
          b64 = os.environ['KEYSTORE_B64'].strip()
          with open('android/app/release.jks', 'wb') as f:
              f.write(base64.b64decode(b64))
          "

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon
        env:
          SIGNING_STORE_PATH: release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
